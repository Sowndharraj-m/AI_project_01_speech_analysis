{% extends 'base.html' %}

{% block content %}
<div class="row mb-5 text-center">
    <h2 class="fw-bold" style="color: #2a5298;">📈 Improvement Dashboard 🚀</h2>
    <p class="text-muted">Track your speaking progress and fluency over time</p>
</div>

<div class="row g-4">

    <!-- Confidence Over Time Chart -->
    <div class="col-lg-8">
        <div class="card shadow border-0">
            <div class="card-header text-white fw-bold" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                🎯 Confidence Score Trend
            </div>
            <div class="card-body">
                <canvas id="confidenceChart" height="150"></canvas>
            </div>
        </div>
    </div>

    <!-- Speed Tracking Chart -->
    <div class="col-lg-4">
        <div class="card shadow border-0">
            <div class="card-header text-white fw-bold" style="background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);">
                ⚡ Speech Speed Tracking
            </div>
            <div class="card-body">
                <canvas id="speedChart" height="250"></canvas>
            </div>
        </div>
    </div>

    <!-- Radar Capabilities Chart -->
    <div class="col-lg-12">
        <div class="card shadow border-0">
            <div class="card-header text-white fw-bold" style="background: linear-gradient(135deg, #f12711 0%, #f5af19 100%);">
                🕸️ Capability Overview (Latest vs Average)
            </div>
            <div class="card-body d-flex justify-content-center">
                <canvas id="radarChart" height="400" style="max-height: 400px; max-width: 600px;"></canvas>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}

<script>

const labels = {{ labels|safe }};
const scores = {{ scores|safe }};
const speeds = {{ speeds|safe }};

// Confidence Chart
const ctxConfidence = document.getElementById('confidenceChart').getContext('2d');

new Chart(ctxConfidence, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Confidence Score',
            data: scores,
            borderColor: '#198754',
            backgroundColor: 'rgba(25,135,84,0.2)',
            borderWidth: 3,
            fill: true,
            tension: 0.3,
            pointBackgroundColor: '#198754',
            pointRadius: 4,
            pointHoverRadius: 6
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return 'Score: ' + context.parsed.y + '%';
                    }
                }
            }
        },
        scales: {
            x: {
                ticks: {
                    maxRotation: 45,
                    minRotation: 45
                }
            },
            y: {
                min: 0,
                max: 100
            }
        }
    }
});


// Speed Chart
const ctxSpeed = document.getElementById('speedChart').getContext('2d');

new Chart(ctxSpeed, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Speech Speed',
            data: speeds,
            backgroundColor: 'rgba(13, 202, 240, 0.8)',
            borderColor: '#0dcaf0',
            borderWidth: 1,
            borderRadius: 4
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return 'Speed: ' + context.parsed.y + ' WPM';
                    }
                }
            }
        },
        scales: {
            x: {
                ticks: {
                    maxRotation: 45,
                    minRotation: 45
                }
            },
            y: {
                beginAtZero: true
            }
        }
    }
});

// Radar Chart
const latestRadar = {{ latest_radar|safe }};
const averageRadar = {{ average_radar|safe }};

const ctxRadar = document.getElementById('radarChart').getContext('2d');
new Chart(ctxRadar, {
    type: 'radar',
    data: {
        labels: ['Speed Control', 'Filler Control', 'Pauses', 'Stability', 'Confidence'],
        datasets: [{
            label: 'Latest Recording',
            data: latestRadar,
            backgroundColor: 'rgba(240, 52, 52, 0.2)',
            borderColor: '#f03434',
            pointBackgroundColor: '#f03434',
            pointBorderColor: '#fff',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: '#f03434'
        }, {
            label: 'Historical Average',
            data: averageRadar,
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            borderColor: '#36A2EB',
            pointBackgroundColor: '#36A2EB',
            pointBorderColor: '#fff',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: '#36A2EB'
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return context.dataset.label + ': ' + context.parsed.r + ' pts';
                    }
                }
            }
        },
        scales: {
            r: {
                min: 0,
                max: 100,
                ticks: {
                    stepSize: 20
                }
            }
        }
    }
});

</script>

{% endblock %}
